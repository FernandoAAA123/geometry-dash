<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Dash – Stereo Madness</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}

/* ═══ PANTALLA JUEGO ═══ */
#wrapper{position:relative;width:800px;height:450px;overflow:hidden;background:#000;}

/* HUD superior */
#hud{position:absolute;top:0;left:0;width:100%;height:40px;z-index:20;display:flex;align-items:center;padding:0 14px;gap:10px;pointer-events:none;}
#hud-bar-bg{flex:1;height:10px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);border-radius:5px;overflow:hidden;}
#hud-bar{height:100%;width:0%;background:linear-gradient(90deg,#00ccff,#0066ff);border-radius:5px;transition:width .05s;}
#hud-pct{color:#fff;font-family:'Arial Black',Arial,sans-serif;font-size:11px;min-width:34px;text-align:right;text-shadow:0 1px 3px #000;}
#hud-attempts{color:rgba(255,255,255,.5);font-family:Arial,sans-serif;font-size:10px;letter-spacing:1px;}

/* Pause btn */
#btn-pause{position:absolute;top:6px;right:10px;z-index:30;width:34px;height:34px;border:2px solid rgba(255,255,255,.3);border-radius:50%;background:rgba(0,0,0,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;}
#btn-pause span{display:block;width:4px;height:14px;background:#fff;border-radius:2px;}

/* Canvas */
#c{display:block;position:absolute;top:40px;left:0;}

/* Barra progreso abajo */
#prog-wrap{position:absolute;bottom:0;left:0;width:100%;height:5px;background:rgba(255,255,255,.05);}
#prog-bar{height:100%;width:0%;background:#00ccff;}

/* ═══ OVERLAY PAUSA / MUERTE / WIN ═══ */
#overlay{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:rgba(0,0,0,.75);}
#overlay.show{display:flex;}
#ov-title{font-family:'Arial Black',Arial,sans-serif;font-size:28px;letter-spacing:3px;color:#fff;}
#ov-sub{font-family:Arial,sans-serif;font-size:13px;color:rgba(255,255,255,.5);letter-spacing:2px;}
#ov-stars{display:flex;gap:8px;font-size:30px;}
.ov-btn{padding:10px 32px;font-family:'Arial Black',Arial,sans-serif;font-size:13px;letter-spacing:2px;border:none;border-radius:6px;cursor:pointer;}
.ov-btn:active{transform:scale(.96);}
#ov-btns{display:flex;gap:10px;margin-top:4px;}
</style>
</head>
<body>

<div id="wrapper">
  <!-- HUD -->
  <div id="hud">
    <div id="hud-bar-bg"><div id="hud-bar"></div></div>
    <span id="hud-pct">0%</span>
    <span id="hud-attempts">Attempt 1</span>
  </div>
  <div id="btn-pause"><span></span><span></span></div>

  <!-- CANVAS (H=410 = wrapper 450 - hud 40) -->
  <canvas id="c" width="800" height="410"></canvas>

  <div id="prog-wrap"><div id="prog-bar"></div></div>

  <!-- OVERLAY -->
  <div id="overlay">
    <div id="ov-title">STEREO MADNESS</div>
    <div id="ov-sub" id="ov-sub">PRESIONA ESPACIO O CLIC PARA JUGAR</div>
    <div id="ov-stars"><span style="color:#ffdd00">★</span><span style="color:#333">★</span><span style="color:#333">★</span></div>
    <div id="ov-btns">
      <button class="ov-btn" id="ov-play" style="background:#ffdd00;color:#1a1000;">▶ JUGAR</button>
      <button class="ov-btn" id="ov-menu" style="background:#333;color:#fff;display:none;">☰ MENÚ</button>
    </div>
    <div id="ov-hint" style="font-family:Arial,sans-serif;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px;margin-top:4px;">ESPACIO · CLIC · TOQUE</div>
  </div>
</div>

<!-- MÚSICA -->
<audio id="audio" loop crossorigin="anonymous">

// Límite del nivel (fin = último x + margen)
const LEVEL_END = 12500;

// ── PREPROCESAR NIVEL: calcular Y real en canvas ──
// yOffset en los datos = distancia desde suelo hacia arriba (0 = en el suelo)
// drawY = GROUND_Y - TILE - yOffset  (para bloques/spikes)
// pit06 siempre va al suelo
function makeTile(d) {
  const yo   = d.yOffset || 0;
  const tipo = d.tipo;
  // Tamaño de hitbox (lógico) y de dibujo (visual, sin estirar)
  const [sw, sh] = SPRITE_SIZE[tipo] || [TILE, TILE];
  let drawY, hw, hh, deadly = false, solid = false, isPortal = false;

  if (tipo === 'pit06') {
    drawY = GROUND_Y - sh;   // siempre en el suelo
    hw = sw; hh = sh;
    deadly = true;
  } else if (tipo === 'spike01' || tipo === 'spike02') {
    drawY = GROUND_Y - sh - yo;
    hw = sw; hh = sh;
    deadly = true;
  } else if (tipo === 'block01' || tipo === 'block02') {
    drawY = GROUND_Y - sh - yo;
    hw = sw; hh = sh;
    solid = true;
  } else if (tipo === 'half_block') {
    drawY = GROUND_Y - sh - yo;
    hw = sw; hh = sh;
    solid = true;
  } else if (tipo === 'ship_portal') {
    drawY = GROUND_Y - sh - yo;
    hw = sw; hh = sh;
    isPortal = true;
  } else {
    drawY = GROUND_Y - sh - yo;
    hw = sw; hh = sh;
  }

  return { x: d.x, drawY, w: hw, h: hh, sw, sh, tipo, deadly, solid, isPortal };
}

const LEVEL = LEVEL_RAW.map(makeTile);

// ── FONDO: gradiente de color según progreso ──
// 0%→25% azul oscuro, 25%→50% púrpura, 50%→75% azul medio, 75%→100% azul claro
const BG_STOPS = [
  [0,    [0,  18, 48]],
  [0.25, [15, 0,  50]],
  [0.50, [5,  12, 45]],
  [0.75, [0,  20, 60]],
  [1.00, [0,  26, 70]],
];
function bgColor(p) {
  for (let i = 0; i < BG_STOPS.length - 1; i++) {
    const [p0, c0] = BG_STOPS[i], [p1, c1] = BG_STOPS[i+1];
    if (p >= p0 && p <= p1) {
      const t = (p - p0) / (p1 - p0);
      return `rgb(${~~(c0[0]+(c1[0]-c0[0])*t)},${~~(c0[1]+(c1[1]-c0[1])*t)},${~~(c0[2]+(c1[2]-c0[2])*t)})`;
    }
  }
  return 'rgb(0,20,60)';
}

// ── ESTADO DEL JUEGO ──
let attempt = 1;
let gameRunning = false;
let paused = false;
let RAF = null;

const G = {
  wx: 200, py: GROUND_Y, pvy: 0, angle: 0,
  onGround: false, alive: true, won: false,
  mode: 'cube',
  svy: 0,
  particles: [],
};
let deathTimer = 0;   // frames desde la muerte, separado de G

const PLAYER_SCR = 200; // X fija del jugador en pantalla

function resetG() {
  G.wx = 200; G.py = GROUND_Y; G.pvy = 0; G.angle = 0;
  G.onGround = false; G.alive = true; G.won = false;
  G.mode = 'cube'; G.svy = 0; G.particles = [];
  deathTimer = 0;
  attempt++;
  updateHUD();
}

// ── INPUT ──
let held = false, justPressed = false;

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (!held) justPressed = true;
    held = true;
    if (!gameRunning) startGame();
  }
  if (e.code === 'Escape') togglePause();
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') held = false;
});
canvas.addEventListener('mousedown', () => { justPressed = true; held = true; if (!gameRunning) startGame(); });
canvas.addEventListener('mouseup', () => { held = false; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); justPressed = true; held = true; if (!gameRunning) startGame(); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); held = false; }, { passive: false });

// ── PARTÍCULAS ──
function spawnParticles(x, y) {
  const cols = ['#ffdd00','#ff8800','#ff4400','#fff','#00ccff'];
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * Math.PI * 2, sp = 1.5 + Math.random() * 5;
    G.particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2,
      life: 40, max: 40, c: cols[i % cols.length], s: 3 + Math.random()*4 });
  }
}

// ── COLISIONES ──
function checkCollisions() {
  const HB = 18; // half-size hitbox cubo
  const wx  = G.wx;
  const pL  = wx - HB, pR = wx + HB;
  const pT  = G.py - TILE + 4, pB = G.py - 2;

  for (const o of LEVEL) {
    if (o.x + o.w < pL - 4 || o.x > pR + 4) continue;
    const oT = o.drawY, oB = o.drawY + o.h;
    if (pB <= oT || pT >= oB) continue;
    if (pR <= o.x || pL >= o.x + o.w) continue;

    if (o.isPortal) {
      // Activar modo nave al tocar el portal
      G.mode = 'ship'; G.svy = 0;
      continue;
    }
    if (o.deadly) {
      // Hitbox interno para spikes (más permisivo)
      const pad = 8;
      if (pR - pad > o.x + pad && pL + pad < o.x + o.w - pad &&
          pB - pad > oT + pad) {
        return true; // muerto
      }
    }
    if (o.solid) {
      // ¿Venimos de arriba?
      const prevB = G.py - G.pvy;
      if (prevB - 2 <= oT + 6 && G.pvy >= 0) {
        G.py = oT; G.pvy = 0; G.onGround = true;
        G.angle = Math.round(G.angle / 90) * 90;
      } else {
        return true; // choque lateral = muerte
      }
    }
  }
  return false;
}

function checkShipCollisions() {
  const HB = 14;
  const wx = G.wx;
  const pL = wx - HB, pR = wx + HB;
  const pT = G.py - HB, pB = G.py + HB;

  for (const o of LEVEL) {
    if (o.x + o.w < pL - 4 || o.x > pR + 4) continue;
    const oT = o.drawY, oB = o.drawY + o.h;
    if (pB <= oT || pT >= oB) continue;
    if (pR <= o.x || pL >= o.x + o.w) continue;
    if (o.isPortal) continue;
    if (o.solid || o.deadly) return true;
  }
  return false;
}

// ── UPDATE ──
function update() {
  if (!G.alive || G.won || paused) return;

  G.wx += SPEED;

  // ¿Llegamos al final?
  if (G.wx >= LEVEL_END) { G.won = true; return; }

  if (G.mode === 'cube') {
    G.pvy += GRAVITY;
    G.py  += G.pvy;
    G.onGround = false;

    // Suelo
    if (G.py >= GROUND_Y) {
      G.py = GROUND_Y; G.pvy = 0; G.onGround = true;
      G.angle = Math.round(G.angle / 90) * 90;
    }
    // Techo
    if (G.py - TILE < 0) { die(); return; }

    if (checkCollisions()) { die(); return; }

    if (!G.onGround) G.angle = (G.angle + 8.5) % 360;
    // Salto: responde a justPressed O a held si estamos en suelo
    if ((justPressed || held) && G.onGround) {
      G.pvy = JUMP_V;
      G.onGround = false;
      justPressed = false;
    }

  } else {
    // NAVE
    if (held) G.svy += SHIP_UP; else G.svy += SHIP_GRAV;
    G.svy = Math.max(-9, Math.min(8, G.svy));
    G.py += G.svy;
    G.angle = Math.max(-30, Math.min(30, G.svy * 3.5));

    // Límites nave
    if (G.py >= GROUND_Y)       { die(); return; }
    if (G.py <= 10)              { die(); return; }
    if (checkShipCollisions())   { die(); return; }
  }

  justPressed = false;

  // Partículas
  G.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; });
  G.particles = G.particles.filter(p => p.life > 0);

  updateHUD();
}

function die() {
  if (!G.alive) return;  // evitar doble muerte
  G.alive = false;
  deathTimer = 0;
  spawnParticles(PLAYER_SCR, G.py - TILE / 2);
}

// ── RENDER ──
function drawGrid(camX) {
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const ox = ((TILE - (camX % TILE)) % TILE);
  for (let x = ox; x < W; x += TILE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GROUND_Y); ctx.stroke(); }
  for (let y = 0; y < GROUND_Y; y += TILE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
}

function drawCube(cx, cy, ang) {
  if (!IMG.cube.complete || IMG.cube.naturalWidth === 0) {
    // Fallback cuadrado amarillo
    ctx.save(); ctx.translate(cx, cy - TILE/2); ctx.rotate(ang * Math.PI / 180);
    ctx.fillStyle = '#ffdd00'; ctx.fillRect(-TILE/2, -TILE/2, TILE, TILE);
    ctx.restore(); return;
  }
  ctx.save();
  ctx.translate(cx, cy - TILE / 2);
  ctx.rotate(ang * Math.PI / 180);
  ctx.drawImage(IMG.cube, -TILE / 2, -TILE / 2, TILE, TILE);
  ctx.restore();
}

function drawShip(cx, cy, ang, thrust) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(ang * Math.PI / 180);
  // Motor
  if (thrust) {
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(-36,-7); ctx.lineTo(-32,0); ctx.lineTo(-36,7); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle = '#00ccff';
  ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(-5,-16); ctx.lineTo(24,0); ctx.lineTo(-5,16); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#88eeff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-1,-2,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function render() {
  const camX = G.wx - PLAYER_SCR;
  const pct  = Math.min(1, G.wx / LEVEL_END);

  // Fondo
  ctx.fillStyle = bgColor(pct); ctx.fillRect(0, 0, W, H);

  // Grid
  drawGrid(camX);

  // Suelo
  ctx.fillStyle = '#05050d'; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  // Línea suelo brillante (estilo GD)
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();

  // En modo nave: techo
  if (G.mode === 'ship') {
    ctx.fillStyle = '#05050d'; ctx.fillRect(0, 0, W, 10);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(W, 10); ctx.stroke();
  }

  // Obstáculos
  for (const o of LEVEL) {
    const sx = o.x - camX;
    if (sx + o.w < -10 || sx > W + 10) continue;
    const dy = o.drawY;
    const image = IMG[o.tipo];
    if (image && image.complete && image.naturalWidth > 0) {
      ctx.drawImage(image, sx, dy, o.w, o.h);
    } else {
      // Fallback colored rect
      ctx.fillStyle = o.deadly ? '#ff4400' : o.isPortal ? '#cc44ff' : '#4488aa';
      ctx.fillRect(sx, dy, o.w, o.h);
    }
  }

  // Jugador
  if (G.alive || G.particles.length > 0) {
    if (G.mode === 'cube') drawCube(PLAYER_SCR, G.py, G.angle);
    else drawShip(PLAYER_SCR, G.py - TILE/4, G.angle, held);
  }

  // Partículas
  ctx.save();
  for (const p of G.particles) {
    ctx.globalAlpha = p.life / p.max;
    ctx.fillStyle = p.c;
    ctx.fillRect(p.x - p.s/2, p.y - p.s/2, p.s, p.s);
  }
  ctx.globalAlpha = 1; ctx.restore();

  // Overlay muerte (sin pantalla completa — estilo GD muere y vuelve rápido)
  if (!G.alive && G.particles.length === 0) {
    // Auto-restart tras 60 frames de muerte
    if (!G._deathTimer) G._deathTimer = 0;
    G._deathTimer++;
    if (G._deathTimer > 60) {
      G._deathTimer = 0;
      resetG();
    }
  } else {
    G._deathTimer = 0;
  }
}

// ── HUD ──
function updateHUD() {
  const pct = Math.min(100, Math.round(G.wx / LEVEL_END * 100));
  document.getElementById('hud-bar').style.width = pct + '%';
  document.getElementById('hud-pct').textContent = pct + '%';
  document.getElementById('hud-attempts').textContent = 'Attempt ' + attempt;
  document.getElementById('prog-bar').style.width = pct + '%';
}

// ── LOOP ──
function loop() {
  update();
  render();
  if (G.won) { showWin(); return; }
  RAF = requestAnimationFrame(loop);
}

// ── PAUSA ──
function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  if (paused) {
    audio.pause();
    showOverlay('PAUSA', 'ESPACIO PARA CONTINUAR', false);
  } else {
    audio.play().catch(()=>{});
    hideOverlay();
  }
}

// ── OVERLAY ──
function showOverlay(title, sub, showMenu) {
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-sub').textContent   = sub;
  document.getElementById('ov-menu').style.display = showMenu ? 'block' : 'none';
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

function showWin() {
  if (RAF) { cancelAnimationFrame(RAF); RAF = null; }
  audio.pause();
  gameRunning = false;
  document.getElementById('ov-title').textContent  = '¡NIVEL COMPLETO!';
  document.getElementById('ov-sub').textContent    = 'STEREO MADNESS · 1★';
  document.getElementById('ov-stars').innerHTML    =
    '<span style="color:#ffdd00">★</span><span style="color:#ffdd00">★</span><span style="color:#ffdd00">★</span>';
  document.getElementById('ov-btns').innerHTML =
    '<button class="ov-btn" id="ov-play" style="background:#ffdd00;color:#1a1000;">▶ DE NUEVO</button>';
  document.getElementById('ov-menu').style.display = 'none';
  document.getElementById('ov-hint').textContent = '';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('ov-play').onclick = startGame;
}

// ── INICIO ──
function startGame() {
  hideOverlay();
  resetG();
  G.wx = 200; attempt = Math.max(1, attempt - 1);
  // Ajustar estrellas del overlay por si se volvió al menú
  document.getElementById('ov-stars').innerHTML =
    '<span style="color:#ffdd00">★</span><span style="color:#333">★</span><span style="color:#333">★</span>';
  gameRunning = true; paused = false;
  if (RAF) { cancelAnimationFrame(RAF); RAF = null; }
  audio.currentTime = 0;
  audio.play().catch(() => {});
  RAF = requestAnimationFrame(loop);
}

// ── BOTONES ──
document.getElementById('ov-play').onclick = startGame;
document.getElementById('btn-pause').onclick = togglePause;
document.getElementById('ov-menu').onclick = () => {
  hideOverlay(); paused = false;
  showOverlay('STEREO MADNESS', 'PRESIONA ESPACIO O CLIC PARA JUGAR', false);
};

// Mostrar overlay inicial
showOverlay('STEREO MADNESS', 'PRESIONA ESPACIO O CLIC PARA JUGAR', false);
</script>
</body>
